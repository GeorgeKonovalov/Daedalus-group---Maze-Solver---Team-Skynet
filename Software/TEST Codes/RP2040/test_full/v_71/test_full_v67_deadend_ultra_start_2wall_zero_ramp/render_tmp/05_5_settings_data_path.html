<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>5. Settings data path</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    #wrap {
      padding: 24px;
      display: inline-block;
      background: #ffffff;
    }
    .mermaid svg {
      max-width: none !important;
      height: auto !important;
    }
  </style>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: 'default',
      flowchart: { useMaxWidth: false, htmlLabels: true },
      sequence: { useMaxWidth: false },
      gantt: { useMaxWidth: false }
    });

    window.addEventListener('load', async () => {
      const host = document.querySelector('.mermaid');
      const code = host.textContent;
      const id = 'm' + Math.random().toString(36).slice(2);
      const result = await mermaid.render(id, code);
      host.innerHTML = result.svg;

      const svg = host.querySelector('svg');
      if (svg) {
        const bbox = svg.getBBox();
        const width = Math.ceil(bbox.width + 64);
        const height = Math.ceil(bbox.height + 64);
        document.body.style.width = width + 'px';
        document.body.style.height = height + 'px';
      }
      document.body.setAttribute('data-rendered', 'true');
    });
  </script>
</head>
<body>
  <div id="wrap">
    <div class="mermaid">flowchart LR
  EDITOR[&quot;Digit Editor / Toggle / Cycle&quot;] --&gt; WORK[&quot;workingSettings&quot;]
  WORK --&gt; COMMIT[&quot;commitRuntimeConfig()&quot;]
  COMMIT --&gt; ACTIVE[&quot;activeSettings&quot;]
  COMMIT --&gt; GCFG[&quot;gCfg (float runtime config)&quot;]
  GCFG --&gt; NAV[&quot;Navigation + PID + Motion&quot;]
  ACTIVE --&gt; UI[&quot;Draw screens / menu values&quot;]</div>
  </div>
</body>
</html>
